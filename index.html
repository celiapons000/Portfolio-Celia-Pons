<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponte en mis zapatos</title>

  <!-- Tipografía pixel de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="ASSETS/css/main.css">
</head>

<body>

  <main class="game">

    <!-- PANTALLA DE INICIO -->
    <section class="screen screen--start is-active" id="startScreen">
      <button class="pixel-btn pixel-btn--start" id="startButton">
        JUGAR
      </button>
    </section>

    <!-- PANTALLA ESTANTERÍA -->
    <section class="screen screen--shelf" id="shelfScreen">

      <button class="shoe-btn shoe-btn--jorge" data-character="jorge" aria-label="Elegir zapatos de Jorge">
        <img src="ASSETS/IMG/shoes/shoe-jorge.png" alt="Zapatos de Jorge">
      </button>

      <button class="shoe-btn shoe-btn--ana" data-character="ana" aria-label="Elegir zapatos de Ana">
        <img src="ASSETS/IMG/shoes/shoe-ana.png" alt="Zapatos de Ana">
      </button>

      <button class="shoe-btn shoe-btn--carlos" data-character="carlos" aria-label="Elegir zapatos de Carlos">
        <img src="ASSETS/IMG/shoes/shoe-carlos.png" alt="Zapatos de Carlos">
      </button>

      <button class="shoe-btn shoe-btn--maria" data-character="maria" aria-label="Elegir zapatos de María">
        <img src="ASSETS/IMG/shoes/shoe-maria.png" alt="Zapatos de María">
      </button>

      <button class="pixel-btn pixel-btn--back" id="backToStartButton">
        VOLVER A INICIO
      </button>

    </section>

    <!-- PANTALLA PERSONAJE -->
    <section class="screen screen--character" id="characterScreen">

      <div class="character-stage" id="characterStage">

        <div class="dialogue-box">
          <div class="dialogue-name" id="characterName"></div>
          <p class="dialogue-text" id="dialogueText"></p>
        </div>

        <div class="choice-group" id="choiceGroup">
          <button class="choice-btn" id="choiceOne"></button>
          <button class="choice-btn" id="choiceTwo"></button>
        </div>

        <img class="character-image" id="characterImage" src="" alt="Personaje">

      </div>

    </section>

    <!-- PANTALLA YOU FAILED -->
    <section class="screen screen--failed" id="failedScreen">

      <div class="failed-stage" id="failedStage">

        <img class="failed-character" id="failedCharacter" src="" alt="Personaje cansado">

        <button class="failed-back-btn" id="backToShelfButton">
          VOLVER
        </button>

      </div>

    </section>

  </main>

  <script src="ASSETS/js/game-data.js"></script>
  <script src="ASSETS/js/game.js"></script>
</body>
</html>
